# ╔══════════════════════════════════════════════════════════════╗
# ║              lazycoding configuration file                   ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Usage:
#   cp config.example.yaml config.yaml
#   # Edit config.yaml: fill in your token and paths
#   ./lazycoding config.yaml
#
# Core concept: each conversation can be mapped to a local working directory.
# Messages sent to that conversation are executed by Claude inside that directory.
#
# Platform selection: lazycoding starts every configured adapter simultaneously.
# Any combination of platforms can be active in the same process.
#
#   Platform       | Requires public IP | Connection mode
#   ───────────────┼────────────────────┼─────────────────────────
#   Telegram       | No                 | Long-polling (outbound)
#   Feishu / Lark  | No (default)       | WebSocket long connection
#   QQ group bot   | No                 | WebSocket long connection
#   DingTalk       | No                 | Stream mode (WebSocket)
#   WeCom (企业微信) | Yes               | HTTP webhook (inbound)
#
# Enable a platform by filling in its credentials below; leave empty to skip.

# ─────────────────────────────────────────────────────────────
# Feishu / Lark  (can run alongside Telegram)
# ─────────────────────────────────────────────────────────────
#
# How to set up:
#   1. Go to open.feishu.cn/app → Create custom app
#   2. Copy App ID and App Secret from "Credentials & Basic Info"
#   3. Under "Event Subscriptions" set request URL to:
#        http://<your-host>:8080/feishu
#      Add events: im.message.receive_v1, im.message.action.trigger_v1
#   4. Under "Permissions" enable: im:message, im:message.group_at_msg
#   5. Under "Bot" tab, enable the bot feature
#
feishu:
  app_id: ""          # e.g. "cli_xxxxxxxxxxxxxxxxxx"  (leave empty to disable)
  app_secret: ""      # App Secret from the Feishu developer console

  # Connection mode (default: WebSocket — no public IP or port-forwarding needed).
  # The bot opens an outbound WebSocket to Feishu, just like Telegram long-polling.
  # Set use_webhook: true only if you need the HTTP push model (server deployments
  # with a public IP; also requires encrypt_key/webhook_path/listen_addr below).
  use_webhook: false

  encrypt_key: ""     # Optional AES event encryption key (webhook mode only)
  webhook_path: "/feishu"   # HTTP path for incoming webhooks (webhook mode only)
  listen_addr: ":8080"      # Webhook server listen address (webhook mode only)


# ─────────────────────────────────────────────────────────────
# Telegram  (can run alongside Feishu)
# ─────────────────────────────────────────────────────────────
telegram:
  # Bot token from @BotFather (required).
  # Create a bot: open Telegram → search @BotFather → /newbot
  token: "YOUR_BOT_TOKEN_HERE"

  # Allowlist: only these user_ids may use the bot.
  # Leave empty (or omit the field) to allow everyone.
  # Find your user_id: message @userinfobot on Telegram.
  allowed_user_ids:
    - 123456789   # replace with your own user_id

  # Throttle for in-place message edits (milliseconds).
  # 1000 ms balances responsiveness and Telegram's rate limits.
  # Increase to ~1500 if you see 429 Too Many Requests errors.
  edit_throttle_ms: 1000


# ─────────────────────────────────────────────────────────────
# QQ Group Bot  (WebSocket — no public IP required)
# ─────────────────────────────────────────────────────────────
#
# How to set up:
#   1. Go to https://bots.qq.com → Create application
#   2. Enable group bot and get AppID + ClientSecret
#   3. Configure intent: GROUP_AND_C2C_EVENT (1<<25)
#   4. Add the bot to a QQ group and @mention it to chat
#
qqbot:
  app_id: ""          # AppID from bots.qq.com (leave empty to disable)
  client_secret: ""   # Client Secret from bots.qq.com


# ─────────────────────────────────────────────────────────────
# DingTalk Stream Bot  (WebSocket — no public IP required)
# ─────────────────────────────────────────────────────────────
#
# How to set up:
#   1. Go to https://open.dingtalk.com → Create stream bot application
#   2. Under "Development settings" → "Event subscriptions" enable stream mode
#   3. Subscribe to: /v1.0/im/bot/messages/getAll
#   4. Copy AppKey and AppSecret
#   5. Add the bot to a DingTalk group and @mention it to chat
#
dingtalk:
  app_key: ""         # AppKey from open.dingtalk.com (leave empty to disable)
  app_secret: ""      # AppSecret from open.dingtalk.com


# ─────────────────────────────────────────────────────────────
# WeCom (企业微信) Webhook Bot  (requires public IP)
# ─────────────────────────────────────────────────────────────
#
# How to set up:
#   1. Go to https://work.weixin.qq.com/wework_admin → Applications
#   2. Create a custom application; note CorpID and AgentID + Secret
#   3. Under "Receive messages" → set URL to http://<host>:8081/wework
#   4. Note the Token and EncodingAESKey
#   5. Users must follow the app; message via the app page
#
wework:
  corp_id: ""              # Enterprise CorpID (leave empty to disable)
  agent_id: 0              # Application AgentID
  agent_secret: ""         # Application Secret
  token: ""                # Webhook Token (for signature verification)
  encoding_aes_key: ""     # 43-character base64 AES key
  webhook_path: "/wework"  # HTTP path for incoming webhooks
  listen_addr: ":8081"     # Webhook server listen address


# ─────────────────────────────────────────────────────────────
# Claude CLI – global defaults
# ─────────────────────────────────────────────────────────────
claude:
  # Default working directory.
  # Conversations not listed under `channels` use this directory.
  # Leave empty to use the directory from which lazycoding is launched.
  work_dir: "/Users/yourname/projects/my-project"

  # Extra flags appended to every claude invocation.
  # --dangerously-skip-permissions is added automatically; do not repeat it.
  # Example – use a specific model:
  #   extra_flags:
  #     - "--model"
  #     - "claude-opus-4-6"
  extra_flags: []

  # Request timeout in seconds.  Claude is force-killed after this time.
  timeout_sec: 900


# ─────────────────────────────────────────────────────────────
# Per-conversation working directory (channels)
# ─────────────────────────────────────────────────────────────
#
# Format:
#   channels:
#     "<chat_id>":
#       work_dir: "/absolute/path/to/project"
#       extra_flags: []    # optional, overrides global extra_flags
#
# Conversations not listed here fall back to claude.work_dir.
# How to find a chat_id: start the bot and send /workdir in the target chat,
# then read the conversation id from the terminal log.
# IMPORTANT: chat_ids must be quoted strings in YAML (negative ids especially).
#
channels:
  # ── Example 1: your DM with the bot → Project A ─────────────
  # "123456789":
  #   work_dir: "/Users/yourname/projects/project-a"

  # ── Example 2: a group → Project B ──────────────────────────
  # "-1001234567890":
  #   work_dir: "/Users/yourname/projects/project-b"

  # ── Example 3: another group with a different model ──────────
  # "-1009876543210":
  #   work_dir: "/Users/yourname/projects/project-c"
  #   extra_flags:
  #     - "--model"
  #     - "claude-opus-4-6"


# ─────────────────────────────────────────────────────────────
# Voice transcription (optional)
# ─────────────────────────────────────────────────────────────
#
# Four backends are supported; pick one:
#
# ┌─ Option A: Groq API (recommended, zero install) ───────────┐
# │ • Pure HTTP call, no local software needed                  │
# │ • Free tier: 28 800 seconds/day (~8 hours of audio)        │
# │ • Register: https://console.groq.com → API Keys            │
# │ • Accepts OGG directly; no conversion needed               │
# └────────────────────────────────────────────────────────────┘
#
# ┌─ Option B: whisper-native (embedded CGo) ──────────────────┐
# │ • Requires: brew install whisper-cpp  (installs libwhisper) │
# │ • Build:    go build -tags whisper ./cmd/lazycoding/        │
# │ • Also needs ffmpeg for OGG→WAV conversion                 │
# │ • Model auto-downloaded to ~/.cache/lazycoding/whisper/     │
# └────────────────────────────────────────────────────────────┘
#
# ┌─ Option C: whisper.cpp CLI (fully local) ──────────────────┐
# │ • Install: brew install whisper-cpp                        │
# │ • Download model: whisper-download-ggml-model base         │
# └────────────────────────────────────────────────────────────┘
#
# ┌─ Option D: openai-whisper Python CLI ──────────────────────┐
# │ • Install: pip install openai-whisper  (needs Python+ffmpeg)│
# └────────────────────────────────────────────────────────────┘
#
transcription:
  enabled: false          # set to true to enable voice transcription
  backend: "groq"         # "groq" | "whisper-native" | "whisper-cpp" | "whisper"

  # ── Option A: Groq API ────────────────────────────────────
  groq:
    api_key: ""           # API key from console.groq.com
    model: "whisper-large-v3-turbo"   # fast and accurate
    language: "zh"        # leave empty for auto-detect; "en", "zh", etc.

  # ── Option B: whisper-native (CGo) ───────────────────────
  # Build: go build -tags whisper ./cmd/lazycoding/
  whisper_native:
    model: "base"         # model name (auto-downloaded) or absolute .ggml path
    model_dir: ""         # cache dir; default: ~/.cache/lazycoding/whisper/
    language: "zh"

  # ── Option C: whisper.cpp CLI ─────────────────────────────
  whisper_cpp:
    bin: "whisper-cli"
    model: ""             # required: absolute path to .ggml model file
                          # e.g. /opt/homebrew/share/whisper-cpp/models/ggml-base.bin
    language: "zh"

  # ── Option D: openai-whisper (Python) ─────────────────────
  whisper_py:
    bin: "whisper"
    model: "base"         # tiny | base | small | medium | large
    language: "zh"


# ─────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────
log:
  format: "text"   # "text" (human-readable) | "json" (for log aggregation)
  level: "info"    # "debug" | "info" | "warn" | "error"
  verbose: false   # true = print full conversation transcript to stderr
